base_url = "https://prashantrahul.com"
build_search_index = false
compile_sass = true
generate_feeds = true
minify_html = true
taxonomies = [{ name = "tags" }]
title = "~/prashant"

[search]
include_content = true
include_description = true
include_path = true
include_title = true
index_format = "elasticlunr_json"

[markdown.highlighting]
error_on_missing_language = true
style = "inline"
light_theme = "github-light"
dark_theme = "github-dark"
# A list of files for additional JSON TextMate grammars
extra_grammars = []
# A list of files for additional JSON TextMate themes
# Get themes from https://textmate-grammars-themes.netlify.app/
extra_themes = []


[extra]
dynamic_note = true
generate_feeds = true
fancy_code = true
favicon = "/icons/favicon.ico"
logo = "/icons/logo.avif"
remote_logo_image = "https://raw.githubusercontent.com/prashantrahul141/prashantrahul141.github.io/refs/heads/main/static/icons/logo.png"
mathjax = true
mathjax_dollar_inline_enable = true
repo_url = "https://github.com/prashantrahul141/prashantrahul141.github.io/tree/main/content/"
theme = "auto"                                                                                                                            # light, dark, auto, toggle
toc = true
use_cdn = false

menu = [
    { name = "~/posts", url = "/posts", weight = 1 },
    { name = "~/gallery", url = "/gallery", weight = 2 },
    { name = "~/resume", url = "/Prashant-Rahul-CV.pdf", weight = 3 },
]

show_social_on_nav = false
socials = [
    { name = "github", url = "https://github.com/prashantrahul141/", icon = "github" },
    { name = "mail", url = "mailto:prashantrahul141@protonmail.com", icon = "email" },
    { name = "dotfiles", url = "https://www.github.com/prashantrahul141/dotfiles" },
    { name = "twitter", url = "https://x.com/prashrahul141/", icon = "twitter" },
    { name = "linkedin", url = "https://www.linkedin.com/in/prashantrahul141/", icon = "linkedin" },
]

stylesheets = [
    #"custom.css"    # at /static/custom.css
]

[extra.analytics]
enable = false

[extra.analytics.goatcounter]
user = "prashant141"
host = "goatcounter.com"
